        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        :root {
            --bg-primary: #0a0a0f;

        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-title);

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;

        .text-gradient-red {

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            background: linear-gradient(135deg, #4a90d9, #7ab8f5, #4a90d9);

            -webkit-text-fill-color: transparent;

        .option-card:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }

    <script>
        // ==================== 工具函数 ====================
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + (isError ? 'error' : '') + ' show';
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function generateQRCode(text, size = 72) {
            // 简化版二维码（在实际项目中会使用qrcode库）
            const canvas = document.getElementById('qr-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = size;
            canvas.height = size;

            // 绘制简单的占位图案（实际应使用QR库）
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, size, size);
            ctx.fillStyle = '#fff';
            
            // 简单的可视化占位符
            const margin = 6;
            const blockSize = (size - margin * 2) / 7;
            
            // 定位图案
            for (let corner = 0; corner < 3; corner++) {
                let cx, cy;
                if (corner === 0) { cx = margin; cy = margin; }
                else if (corner === 1) { cx = size - margin - blockSize * 3; cy = margin; }
                else { cx = margin; cy = size - margin - blockSize * 3; }
                
                ctx.fillStyle = '#fff';
                ctx.fillRect(cx + blockSize, cy + blockSize, blockSize, blockSize);
            }

            // 文字提示
            ctx.fillStyle = '#fff';
            ctx.font = '8px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('扫码', size/2, size - 4);
        }

        // ==================== 全局状态 ====================
        const APP = {
            currentPage: 'home',
            questions: [],
            answers: [],
            currentQuestionIndex: 0,
            selectedOption: null,
            result: null,
            scores: null,
            assessmentStartTime: 0
        };

        // ==================== 题库数据 ====================
        const QUESTION_BANK = {
            power: [
                { id: 1, text: '团队讨论陷入僵局时，你通常选择：', options: ['提出方案并推动执行', '等待更有经验的同事决定', '指出大家思考的局限性', '主动承担最难说服的部分', '观察各方立场后提出建议', '建议暂停讨论，冷却情绪'] },
                { id: 2, text: '当你的方案被质疑时，你的第一反应是：', options: ['用更多数据支撑观点', '立即反思是否理解有误', '质疑对方方案的漏洞', '享受这种智力交锋', '根据质疑者身份调整回应', '要求质疑必须基于事实'] },
                { id: 3, text: '分配团队任务时，你倾向于：', options: ['根据能力特长分配', '按领导指示分配', '分配时设定较高目标', '自己承担最困难的部分', '先询问成员意愿再分配', '确保分配公平透明'] },

        // ==================== 页面导航 ====================
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const page = document.getElementById('page-' + pageName);
            if (page) page.classList.add('active');
            APP.currentPage = pageName;
            window.scrollTo(0, 0);

            // 跟踪页面浏览
            if (window.analytics) {
                analytics.trackPageView(pageName);
            }
        }

        function goHome() {
            APP.answers = [];
            APP.currentQuestionIndex = 0;
            APP.result = null;
            APP.scores = null;
            showPage('home');
        }

        function goResult() {
            if (!APP.result) {
                goHome();
                return;
            }
            showPage('result');
        }

        function confirmExit() {
            if (APP.answers.length > 0 && APP.answers.length < 30) {
                if (confirm('确定要退出测评吗？当前进度将丢失。')) {
                    goHome();
                }
            } else {
                goHome();
            }
        }

        // ==================== 测评逻辑 ====================
        function startAssessment() {
            APP.answers = [];
            APP.currentQuestionIndex = 0;
            APP.selectedOption = null;
            APP.result = null;
            APP.scores = null;
            APP.assessmentStartTime = Date.now();

            // 从题库池随机抽取
            const selectedQuestions = [];
            ['power', 'stress', 'relation'].forEach(dim => {
                const pool = [...QUESTION_BANK[dim]];
                const shuffled = pool.sort(() => Math.random() - 0.5);
                const selected = shuffled.slice(0, 10);
                selected.forEach(q => {
                    const indices = [0, 1, 2, 3, 4, 5];
                    const shuffledIndices = indices.sort(() => Math.random() - 0.5);
                    selectedQuestions.push({
                        ...q,
                        dimension: dim,
                        shuffledIndices: shuffledIndices,
                        shuffledOptions: shuffledIndices.map(i => q.options[i])
                    });
                });
            });

            APP.questions = selectedQuestions.sort(() => Math.random() - 0.5);
            APP.currentQuestionIndex = 0;
            APP.selectedOption = null;

            // 跟踪测评开始
            if (window.analytics) {
                analytics.trackAssessmentStart();
            }

            showPage('assessment');
            renderQuestion();
        }

        function renderQuestion() {
            const q = APP.questions[APP.currentQuestionIndex];
            const dimNames = { power: '权力偏好', stress: '压力应对', relation: '关系模式' };

            document.getElementById('dimension-tag').textContent = 
                '▎' + (dimNames[q.dimension] || '');
            document.getElementById('question-text').textContent = q.text;
            document.getElementById('current-q').textContent = APP.currentQuestionIndex + 1;

            const progress = ((APP.currentQuestionIndex) / 30) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            APP.selectedOption = null;

            q.shuffledOptions.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'option-card rounded-xl p-4 flex items-center';
                div.innerHTML = `
                    <span class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold border border-gray-700 mr-3 flex-shrink-0">${String.fromCharCode(65 + idx)}</span>
                    <span class="text-sm">${opt}</span>
                `;
                div.onclick = () => selectOption(idx);
                container.appendChild(div);
            });

            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = true;
            nextBtn.className = 'w-full py-4 rounded-2xl text-lg font-bold bg-gray-800 text-gray-600 transition-all duration-300';
            nextBtn.textContent = APP.currentQuestionIndex === 29 ? '查看结果' : '下一题';

            // 滚动到题目区域
            setTimeout(() => {
                document.getElementById('question-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }

        function selectOption(idx) {
            APP.selectedOption = idx;
            document.querySelectorAll('.option-card').forEach((el, i) => {
                el.classList.toggle('active', i === idx);
            });

            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = false;
            nextBtn.className = 'w-full py-4 rounded-2xl text-lg font-bold bg-gradient-to-r from-yellow-600 to-yellow-400 text-gray-900 hover:from-yellow-500 hover:to-yellow-300 transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] glow-gold';
        }

        function nextQuestion() {
            if (APP.selectedOption === null) return;

            const q = APP.questions[APP.currentQuestionIndex];
            const originalIndex = q.shuffledIndices[APP.selectedOption];
            const typeMap = ['Dominant', 'Submissive', 'Sadist', 'Masochist', 'Switch', 'Safeword'];
            APP.answers.push(typeMap[originalIndex]);

            if (APP.currentQuestionIndex < 29) {
                APP.currentQuestionIndex++;
                APP.selectedOption = null;
                renderQuestion();
            } else {
                calculateResult();
            }
        }

            const canvas = document.getElementById('radar-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const types = ['Dominant', 'Submissive', 'Sadist', 'Masochist', 'Switch', 'Safeword'];
            const labels = ['支配者', '服从者', '施压者', '承压者', '切换者', '安全词'];
            const colors = ['#D4AF37', '#4A90D9', '#E74C3C', '#E67E22', '#2ECC71', '#9B59B6'];
            const maxScore = 10;
            const values = types.map(t => (APP.scores[t] / 30 * 10));

            const size = Math.min(canvas.parentElement.clientWidth - 32, 280);
            canvas.width = size;
            canvas.height = size;
            const cx = size / 2, cy = size / 2, r = size * 0.33;

            ctx.clearRect(0, 0, size, size);

            // 网格
            for (let i = 1; i <= 4; i++) {
                ctx.beginPath();
                for (let j = 0; j < 6; j++) {
                    const angle = (Math.PI * 2 / 6) * j - Math.PI / 2;
                    const x = cx + r * (i / 4) * Math.cos(angle);
                    const y = cy + r * (i / 4) * Math.sin(angle);
                    if (j === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // 轴线
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI * 2 / 6) * i - Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
                ctx.strokeStyle = 'rgba(255,255,255,0.06)';
                ctx.stroke();
            }

            // 数据区域
            ctx.beginPath();
            values.forEach((v, i) => {
                const angle = (Math.PI * 2 / 6) * i - Math.PI / 2;
                const x = cx + r * (v / 4) * Math.cos(angle);
                const y = cy + r * (v / 4) * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.closePath();

            // 渐变填充
            const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
            gradient.addColorStop(0, 'rgba(212, 175, 55, 0.25)');
            gradient.addColorStop(1, 'rgba(212, 175, 55, 0.05)');
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = 'rgba(212, 175, 55, 0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 数据点
            values.forEach((v, i) => {
                const angle = (Math.PI * 2 / 6) * i - Math.PI / 2;
                const x = cx + r * (v / 4) * Math.cos(angle);
                const y = cy + r * (v / 4) * Math.sin(angle);
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fillStyle = colors[i];
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();
            });

            // 标签
            ctx.font = '10px Inter, PingFang SC, sans-serif';
            ctx.textAlign = 'center';
            labels.forEach((label, i) => {
                const angle = (Math.PI * 2 / 6) * i - Math.PI / 2;
                const x = cx + (r + 22) * Math.cos(angle);
                const y = cy + (r + 22) * Math.sin(angle);
                ctx.fillStyle = '#a0a0b0';
                ctx.fillText(label, x, y + 4);
            });
        }

        // ==================== 分享功能 ====================
        function showSharePage() {
            if (!APP.result) {
                goHome();
                return;
            }
            const r = APP.result;

            document.getElementById('share-icon').textContent = r.icon;
            document.getElementById('share-name').textContent = r.name;
            document.getElementById('share-tagline').textContent = r.tagline;
            document.getElementById('share-quote').textContent = '"' + r.desc + '"';

            const now = new Date();
            document.getElementById('share-date').textContent = 
                now.getFullYear() + '.' + String(now.getMonth() + 1).padStart(2, '0') + '.' + String(now.getDate()).padStart(2, '0');

            showPage('share');

            // 生成二维码
            setTimeout(() => generateQRCode(window.location.href), 200);

            // 检测微信环境
            detectWechatEnv();

            // 跟踪分享页浏览
            if (window.analytics) {
                analytics.track('share_page_view', { type: r.typeId });
            }
        }

        function detectWechatEnv() {
            const isWechat = /MicroMessenger/i.test(navigator.userAgent);
            const btn = document.getElementById('wechat-share-btn');
            if (isWechat) {
                btn.textContent = '💬 点击右上角分享给朋友';
                btn.onclick = function() {
                    showToast('请点击右上角"..."按钮分享');
                };
            }
        }

        async function saveShareImage() {
            const btn = document.getElementById('save-btn');
            const originalText = btn.textContent;
            btn.textContent = '生成中...';
            btn.classList.add('btn-loading');

            try {
                const card = document.getElementById('share-card');
                const canvas = await html2canvas(card, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#1a1a2e',
                    logging: false
                });

                // 创建下载链接
                const link = document.createElement('a');
                link.download = '职场权力人格报告_' + (APP.result ? APP.result.name : '') + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                showToast('报告图片已保存！');

                // 跟踪保存行为
                if (window.analytics) {
                    analytics.trackImageSave();
                }
            } catch (err) {
                console.error('Save image error:', err);
                showToast('保存失败，请尝试截图保存', true);
            } finally {
                btn.textContent = originalText;
                btn.classList.remove('btn-loading');
            }
        }

        function copyShareLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                showToast('链接已复制，快去分享吧！');
                if (window.analytics) {
                    analytics.trackLinkCopy();
                }
            }).catch(() => {
                // 降级方案
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showToast('链接已复制！');
            });
        }

        function shareViaWechat() {
            const isWechat = /MicroMessenger/i.test(navigator.userAgent);
            if (isWechat) {
                showToast('请点击右上角"..."按钮分享');
            } else {
                // 非微信环境，提示用户
                showToast('请保存图片后分享到微信');
            }

            if (window.analytics) {
                analytics.trackShare('wechat');
            }
        }

        // ==================== 初始化 ====================
        function init() {
            // 更新用户数（从本地统计获取）
            try {
                if (window.analytics) {
                    const stats = analytics.getLocalStats();
                    const total = 12847 + stats.totalCompletions;
                    document.getElementById('total-users').textContent = total.toLocaleString();
                }
            } catch(e) {}

            // 注册Service Worker
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('service-worker.js').catch(() => {});
                });
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);

        // 处理浏览器后退
        window.addEventListener('popstate', (e) => {
            if (APP.currentPage === 'assessment' && APP.answers.length > 0) {
                confirmExit();
            }
        });
    </script>
