    <script>
        // ==================== 工具函数 ====================
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + (isError ? 'error' : '') + ' show';
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function generateQRCode(text, size = 72) {
            const canvas = document.getElementById('qr-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = size;
            canvas.height = size;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, size, size);
            ctx.fillStyle = '#fff';

            const margin = 6;
            const blockSize = (size - margin * 2) / 7;

            for (let corner = 0; corner < 3; corner++) {
                let cx, cy;
                if (corner === 0) { cx = margin; cy = margin; }
                else if (corner === 1) { cx = size - margin - blockSize * 3; cy = margin; }
                else { cx = margin; cy = size - margin - blockSize * 3; }

                ctx.fillStyle = '#fff';
                ctx.fillRect(cx + blockSize, cy + blockSize, blockSize, blockSize);
            }

            ctx.fillStyle = '#fff';

        // ==================== 页面导航 ====================
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const page = document.getElementById('page-' + pageName);
            if (page) page.classList.add('active');
            APP.currentPage = pageName;
            window.scrollTo(0, 0);

            if (window.analytics) {
                analytics.trackPageView(pageName);
            }
        }

        function goHome() {
            APP.answers = [];
            APP.currentQuestionIndex = 0;
            APP.result = null;
            APP.scores = null;
            showPage('home');
        }

        function goResult() {
            if (!APP.result) {
                goHome();
                return;
            }
            showPage('result');
        }

        function confirmExit() {
            if (APP.answers.length > 0 && APP.answers.length < 30) {
                if (confirm('确定退出吗？当前进度将丢失。')) {

                }
            } else {
                goHome();
            }
        }

                const pool = [...QUESTION_BANK[dim]];
                const shuffled = pool.sort(() => Math.random() - 0.5);
                const selected = shuffled.slice(0, 10);
                selected.forEach(q => {
                    const indices = [0, 1, 2, 3, 4, 5];
                    const shuffledIndices = indices.sort(() => Math.random() - 0.5);
                    selectedQuestions.push({
                        ...q,
                        dimension: dim,
                        shuffledIndices: shuffledIndices,
                        shuffledOptions: shuffledIndices.map(i => q.options[i])
                    });
                });
            });

            APP.questions = selectedQuestions.sort(() => Math.random() - 0.5);
            APP.currentQuestionIndex = 0;
            APP.selectedOption = null;

            if (window.analytics) {
                analytics.trackAssessmentStart();
            }

            showPage('assessment');
            renderQuestion();
        }

        function renderQuestion() {
            const q = APP.questions[APP.currentQuestionIndex];
            const dimNames = { power: '权力偏好', stress: '压力应对', relation: '关系模式' };

            document.getElementById('dimension-tag').textContent =
                '▎' + (dimNames[q.dimension] || '');
            document.getElementById('question-text').textContent = q.text;
            document.getElementById('current-q').textContent = APP.currentQuestionIndex + 1;

            const progress = ((APP.currentQuestionIndex) / 30) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            APP.selectedOption = null;

            q.shuffledOptions.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'option-card rounded-xl p-4 flex items-center';
                div.innerHTML = `
                    <span class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold border border-gray-600 mr-3 flex-shrink-0">${String.fromCharCode(65 + idx)}</span>
                    <span class="text-sm text-gray-200">${opt}</span>
                `;
                let touchStartY = 0;
                div.addEventListener('touchstart', (e) => {
                    touchStartY = e.touches[0].clientY;
                }, { passive: true });
                div.addEventListener('touchend', (e) => {
                    const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
                    if (dy < 10) selectOption(idx);
                });
                div.addEventListener('click', () => selectOption(idx));
                container.appendChild(div);
            });

            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = true;
            nextBtn.className = 'w-full py-4 rounded-2xl text-lg font-bold bg-gray-800 text-gray-600 transition-all duration-300';
            nextBtn.textContent = APP.currentQuestionIndex === 29 ? '查看结果' : '下一题';

            // Scroll question area to top
            const scrollArea = document.querySelector('#page-assessment .assessment-scroll');
            if (scrollArea) scrollArea.scrollTop = 0;
        }

        function selectOption(idx) {
            APP.selectedOption = idx;
            document.querySelectorAll('.option-card').forEach((el, i) => {
                el.classList.toggle('active', i === idx);
            });

            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = false;
            nextBtn.className = 'w-full py-4 rounded-2xl text-lg font-bold bg-gradient-to-r from-yellow-600 to-yellow-400 text-gray-900 hover:from-yellow-500 hover:to-yellow-300 transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] glow-gold';
        }

        function nextQuestion() {
            if (APP.selectedOption === null) return;

            const q = APP.questions[APP.currentQuestionIndex];
            const originalIndex = q.shuffledIndices[APP.selectedOption];
            const typeMap = ['Dominant', 'Submissive', 'Sadist', 'Masochist', 'Switch', 'Safeword'];
            APP.answers.push(typeMap[originalIndex]);

            if (APP.currentQuestionIndex < 29) {
                APP.currentQuestionIndex++;
                APP.selectedOption = null;
                renderQuestion();
            } else {
                calculateResult();
            }
        }

        // ==================== 结果计算 ====================

            const duration = Date.now() - APP.assessmentStartTime;

                analytics.trackAssessmentComplete(resultType, APP.scores, duration);
            }

            setTimeout(() => {
                renderResult();

        function renderResult() {
            const r = APP.result;
            document.getElementById('result-icon').textContent = r.icon;

            const nameEl = document.getElementById('result-name');
            nameEl.textContent = r.name;
            nameEl.className = 'text-4xl font-black tracking-tight ' + (r.gradientClass || 'text-gradient');

            document.getElementById('result-tagline').textContent = r.tagline;
            document.getElementById('result-desc').textContent = r.desc;

            const bar = document.getElementById('result-accent-bar');
            if (bar && r.color) {
                bar.style.background = 'linear-gradient(to bottom, ' + r.color + ', transparent)';
            }

            document.getElementById('result-traits').innerHTML = r.traits.map(t =>
                `<span class="px-3 py-1.5 rounded-full text-xs font-bold bg-gray-800/80 text-gray-200 border border-gray-700">${t}</span>`
            ).join('');

            document.getElementById('result-risks').innerHTML = r.risks.map(risk =>
                `<div class="flex items-start"><span class="text-red-500 mr-2 text-sm mt-0.5">▸</span><span class="text-sm text-gray-300">${risk}</span></div>`
            ).join('');

            document.getElementById('result-advice').textContent = r.advice;

            setTimeout(drawRadar, 300);
        }

        function drawRadar() {
            const canvas = document.getElementById('radar-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const types = ['Dominant', 'Submissive', 'Sadist', 'Masochist', 'Switch', 'Safeword'];
            const labels = ['支配者', '服从者', '施压者', '承压者', '切换者', '安全词'];
            const colors = ['#c9a227', '#3b82f6', '#e63946', '#f97316', '#10b981', '#a855f7'];
            const maxScore = 10;
            const values = types.map(t => (APP.scores[t] / 30 * 10));

            const size = Math.min(canvas.parentElement.clientWidth - 32, 280);
            canvas.width = size;
            canvas.height = size;
            const cx = size / 2, cy = size / 2, r = size * 0.33;

            ctx.clearRect(0, 0, size, size);

            for (let i = 1; i <= 4; i++) {
                ctx.beginPath();
                for (let j = 0; j < 6; j++) {
                    const angle = (Math.PI * 2 / 6) * j - Math.PI / 2;
                    const x = cx + r * (i / 4) * Math.cos(angle);
                    const y = cy + r * (i / 4) * Math.sin(angle);
                    if (j === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.strokeStyle = 'rgba(255,255,255,0.06)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI * 2 / 6) * i - Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
                ctx.strokeStyle = 'rgba(255,255,255,0.04)';
                ctx.stroke();
            }

            ctx.beginPath();
            values.forEach((v, i) => {
                const angle = (Math.PI * 2 / 6) * i - Math.PI / 2;
                const x = cx + r * (v / 4) * Math.cos(angle);
                const y = cy + r * (v / 4) * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.closePath();

            const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
            gradient.addColorStop(0, 'rgba(201, 162, 39, 0.3)');
            gradient.addColorStop(1, 'rgba(201, 162, 39, 0.04)');
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = 'rgba(201, 162, 39, 0.6)';
            ctx.lineWidth = 2;
            ctx.stroke();

            values.forEach((v, i) => {
                const angle = (Math.PI * 2 / 6) * i - Math.PI / 2;
                const x = cx + r * (v / 4) * Math.cos(angle);
                const y = cy + r * (v / 4) * Math.sin(angle);
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fillStyle = colors[i];
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            });

            ctx.font = 'bold 10px Inter, PingFang SC, sans-serif';
            ctx.textAlign = 'center';
            labels.forEach((label, i) => {
                const angle = (Math.PI * 2 / 6) * i - Math.PI / 2;
                const x = cx + (r + 24) * Math.cos(angle);
                const y = cy + (r + 24) * Math.sin(angle);
                ctx.fillStyle = '#b0b0c0';
                ctx.fillText(label, x, y + 4);
            });
        }

        // ==================== 分享功能 ====================
        function showSharePage() {
            if (!APP.result) {
                goHome();
                return;
            }
            const r = APP.result;

            document.getElementById('share-icon').textContent = r.icon;
            document.getElementById('share-name').textContent = r.name;
            document.getElementById('share-tagline').textContent = r.tagline;
            document.getElementById('share-quote').textContent = '"' + r.desc + '"';

            const now = new Date();
            document.getElementById('share-date').textContent =
                now.getFullYear() + '.' + String(now.getMonth() + 1).padStart(2, '0') + '.' + String(now.getDate()).padStart(2, '0');

            showPage('share');

            setTimeout(() => generateQRCode(window.location.href), 200);

            detectWechatEnv();

            if (window.analytics) {
                analytics.track('share_page_view', { type: r.typeId });
            }
        }

        function detectWechatEnv() {
            const isWechat = /MicroMessenger/i.test(navigator.userAgent);
            const btn = document.getElementById('wechat-share-btn');
            if (isWechat) {
                btn.textContent = '点击右上角分享给朋友';
                btn.onclick = function() {
                    showToast('请点击右上角"..."按钮分享');
                };
            }
        }

        async function saveShareImage() {
            const btn = document.getElementById('save-btn');
            const originalText = btn.textContent;
            btn.textContent = '生成中...';
            btn.classList.add('btn-loading');

            try {
                const card = document.getElementById('share-card');
                const canvas = await html2canvas(card, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#14142a',
                    logging: false
                });

                const link = document.createElement('a');
                link.download = '职场权力人格报告_' + (APP.result ? APP.result.name : '') + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                showToast('报告图片已保存！');

                if (window.analytics) {
                    analytics.trackImageSave();
                }
            } catch (err) {
                console.error('Save image error:', err);
                showToast('保存失败，请尝试截图保存', true);
            } finally {
                btn.textContent = originalText;
                btn.classList.remove('btn-loading');
            }
        }

        function copyShareLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                showToast('链接已复制，快发出去！');
                if (window.analytics) {
                    analytics.trackLinkCopy();
                }
            }).catch(() => {
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showToast('链接已复制！');
            });
        }

        function shareViaWechat() {
            const isWechat = /MicroMessenger/i.test(navigator.userAgent);
            if (isWechat) {
                showToast('请点击右上角"..."按钮分享');
            } else {
                showToast('请保存图片后分享到微信');
            }

            if (window.analytics) {
                analytics.trackShare('wechat');
            }
        }

        // ==================== 初始化 ====================
        function init() {
            try {
                if (window.analytics) {
                    const stats = analytics.getLocalStats();
                    const total = 15847 + stats.totalCompletions;
                    document.getElementById('total-users').textContent = total.toLocaleString();
                }
            } catch(e) {}

            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('service-worker.js').catch(() => {});
                });
            }
        }

        document.addEventListener('DOMContentLoaded', init);

        window.addEventListener('popstate', (e) => {
            if (APP.currentPage === 'assessment' && APP.answers.length > 0) {
                confirmExit();
            }
        });
    </script>
