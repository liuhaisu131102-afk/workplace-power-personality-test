<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <script src="assets/tailwind.js"></script>
    <script src="assets/html2canvas.min.js"></script>
    <script src="assets/analytics.js"></script>
    <style>
        :root {
            --bg-primary: #020203;
            --bg-secondary: #0a0a0f;
            --bg-card: #0a0a0f;
            --text-primary: #ffffff;
            --text-secondary: #b0b0c0;
            --text-muted: #5a5a6e;
            --accent-red: #ff0066;
            --accent-red2: #ff1a75;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-purple: #a855f7;
            --accent-orange: #f97316;
            --border: #1a1a2e;
            --glow-red: rgba(255, 0, 102, 0.35);
            --glow-red2: rgba(255, 26, 117, 0.35);
            --glow-blue: rgba(59, 130, 246, 0.3);
            --glow-green: rgba(16, 185, 129, 0.3);
            --glow-purple: rgba(168, 85, 247, 0.3);
            --glow-orange: rgba(249, 115, 22, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body, #app {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        .bg-noise {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        }

        .glass {
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glow-red { box-shadow: 0 0 30px var(--glow-red), 0 0 80px rgba(255, 0, 102, 0.08); }
        .glow-blue { box-shadow: 0 0 30px var(--glow-blue), 0 0 60px rgba(59, 130, 246, 0.08); }
        .glow-green { box-shadow: 0 0 30px var(--glow-green), 0 0 60px rgba(16, 185, 129, 0.08); }
        .glow-purple { box-shadow: 0 0 30px var(--glow-purple), 0 0 60px rgba(168, 85, 247, 0.08); }
        .glow-orange { box-shadow: 0 0 30px var(--glow-orange), 0 0 60px rgba(249, 115, 22, 0.08); }

        .text-gradient {
            background: linear-gradient(135deg, #ff0066, #ff1a75, #ff0066);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .text-gradient-red {
            background: linear-gradient(135deg, #ff0066, #ff1a75, #ff0066);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .text-gradient-blue {
            background: linear-gradient(135deg, #3b82f6, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .text-gradient-green {
            background: linear-gradient(135deg, #10b981, #34d399, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .text-gradient-purple {
            background: linear-gradient(135deg, #a855f7, #c084fc, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .text-gradient-orange {
            background: linear-gradient(135deg, #f97316, #fb923c, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .option-card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid var(--border);
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            touch-action: pan-y;
        }
        .option-card:hover { border-color: rgba(255,255,255,0.25); transform: translateY(-1px); }
        .option-card:active { transform: scale(0.985); }
        .option-card.active {
            border-color: var(--accent-red);
            background: rgba(255, 0, 102, 0.12);
            box-shadow: 0 0 20px rgba(255, 0, 102, 0.12), inset 0 0 30px rgba(255, 0, 102, 0.05);
        }

        .progress-bar {
            background: var(--border);
            height: 3px;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #ff0066, #ff1a75, #ff0066);
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
            height: 100%;
            transition: width 0.4s ease;
            border-radius: 2px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .share-card {
            background: linear-gradient(155deg, #0a0a0f, #0f0f1a);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 32px 28px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }
        .share-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(255,0,102,0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-slow { animation: pulse 2.2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-up { animation: fadeInUp 0.5s ease forwards; }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px var(--glow-red); }
            50% { box-shadow: 0 0 50px var(--glow-red), 0 0 100px rgba(255,0,102,0.12); }
        }
        .glow-animate { animation: glow 2.2s ease-in-out infinite; }

        @keyframes scaleIn {
            from { transform: scale(0.75); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .scale-in { animation: scaleIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        @keyframes borderPulse {
            0%, 100% { border-color: rgba(255, 0, 102, 0.3); }
            50% { border-color: rgba(255, 0, 102, 0.7); }
        }
        .border-pulse { animation: borderPulse 2s ease-in-out infinite; }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes textReveal {
            from { clip-path: inset(0 100% 0 0); }
            to { clip-path: inset(0 0 0 0); }
        }
        .text-reveal { animation: textReveal 0.8s cubic-bezier(0.77, 0, 0.175, 1) forwards; }

        .page { display: none; opacity: 0; transition: opacity 0.35s ease; }
        .page.active { display: block; opacity: 1; }
        #page-home.active { display: flex; flex-direction: column; align-items: center; height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        #page-assessment.active { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        #page-loading.active { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; }
        #page-result.active { display: flex; flex-direction: column; height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        #page-share.active { display: flex; flex-direction: column; height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }

        #page-assessment .assessment-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

        .typing-text {
            border-right: 2px solid var(--accent-red);
            animation: blink 0.7s step-end infinite;
        }
        @keyframes blink { 50% { border-color: transparent; } }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 15, 0.95);
            border: 1px solid var(--accent-red);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(12px);
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .toast.error { border-color: var(--accent-orange); }

        .btn-loading {
            position: relative;
            pointer-events: none;
        }
        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            right: 20px;
            top: 50%;
            margin-top: -10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .accent-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }
    </style>
</head>
<body class="bg-noise">
    <div class="toast" id="toast"></div>

    <div id="app">
        <!-- ==================== 首页 ==================== -->
        <div class="page active px-6 pt-16 pb-12" id="page-home">
                <div class="w-full max-w-md mx-auto text-center">
                    <!-- Logo -->
                    <div class="mb-8 relative inline-block">
                        <div class="w-28 h-28 rounded-full glass flex items-center justify-center mx-auto text-6xl glow-animate border-pulse">
                            ⚖️
                        </div>
                    </div>

                    <!-- 主标题 -->
                    <h1 class="text-4xl font-black mb-2 tracking-tighter">
                        <span class="text-gradient">你到底是猎物</span>
                    </h1>
                    <h1 class="text-4xl font-black mb-2 tracking-tighter">
                        <span class="text-gradient-red">还是猎人？</span>
                    </h1>

                    <!-- 副标题 -->
                    <p class="text-lg text-gray-300 mb-1 font-bold">
                        别装，测完你就知道自己在食物链哪一层
                    </p>
                    <p class="text-sm text-gray-500 mb-10">
                        30题 · 5分钟 · 测出你的职场生存率
                    </p>

                    <!-- 数据展示 -->
                    <div class="glass rounded-2xl p-5 mb-8 flex justify-around text-center">
                        <div>
                            <div class="text-2xl font-bold text-gradient" id="total-users">28,456</div>
                            <div class="text-xs text-gray-500 mt-1">已测</div>
                        </div>
                        <div class="w-px bg-gray-800"></div>
                        <div>
                            <div class="text-2xl font-bold text-gradient-red">12</div>
                            <div class="text-xs text-gray-500 mt-1">种生存人格</div>
                        </div>
                        <div class="w-px bg-gray-800"></div>
                        <div>
                            <div class="text-2xl font-bold text-gradient">91%</div>
                            <div class="text-xs text-gray-500 mt-1">测完想发给同事</div>
                        </div>
                    </div>

                    <!-- 开始按钮 -->
                    <button onclick="startAssessment()" class="w-full py-4 rounded-2xl text-lg font-bold bg-gradient-to-r from-red-600 to-pink-500 text-white glow-red hover:from-red-500 hover:to-pink-400 transition-all duration-300 transform hover:scale-[1.03] active:scale-[0.97]">
                        测测你的职场生存率
                    </button>

                    <p class="mt-8 text-xs text-gray-700 italic">
                        "测完发给老板，让他知道你在想什么"
                    </p>
                </div>
        </div>

        <!-- ==================== 测评页 ==================== -->
        <div class="page" id="page-assessment">
            <!-- Fixed header -->
            <div class="glass px-4 py-3 flex-shrink-0">
                <div class="flex items-center justify-between max-w-md mx-auto">
                    <button onclick="confirmExit()" class="text-gray-400 hover:text-white transition px-2 py-1 text-sm">
                        ← 放弃测评
                    </button>
                    <div class="text-sm text-gray-500 font-mono">
                        <span id="current-q">1</span>/30
                    </div>
                    <div class="w-16"></div>
                </div>
                <div class="progress-bar max-w-md mx-auto mt-2">
                    <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                </div>
            </div>

            <!-- Scrollable content area -->
            <div class="assessment-scroll">
                <div class="px-6 py-6 max-w-md mx-auto w-full">
                    <div id="question-area">
                        <div class="text-xs text-gray-500 mb-3 tracking-widest uppercase" id="dimension-tag"></div>
                        <h2 class="text-xl font-bold mb-8 leading-relaxed" id="question-text"></h2>
                        <div class="space-y-3" id="options-container"></div>
                    </div>
                </div>
            </div>

            <!-- Fixed bottom button -->
            <div class="px-6 pb-6 pt-3 max-w-md mx-auto w-full flex-shrink-0" style="padding-bottom: max(24px, env(safe-area-inset-bottom));">
                <button onclick="nextQuestion()" id="next-btn" class="w-full py-4 rounded-2xl text-lg font-bold bg-gray-800 text-gray-600 transition-all duration-300" disabled>
                    下一题
                </button>
            </div>
        </div>

        <!-- ==================== 加载页 ==================== -->
        <div class="page px-6" id="page-loading">
            <div class="text-center">
                <div class="w-24 h-24 rounded-full glass flex items-center justify-center mx-auto mb-8 animate-pulse-slow text-5xl border-pulse">
                    🔪
                </div>
                <h2 class="text-2xl font-bold mb-6">正在解剖你的职场人格</h2>
                <div class="space-y-4 text-sm text-gray-400">
                    <p class="fade-in-up" style="animation-delay: 0.3s">扫描你的控制欲与服从性...</p>
                    <p class="fade-in-up" style="animation-delay: 1.2s">匹配 12 种职场生存人格...</p>
                    <p class="fade-in-up" style="animation-delay: 2.1s">生成你的职场生存风险评估...</p>
                </div>
                <p class="mt-10 text-xs text-gray-600 animate-pulse-slow italic">
                    "结果可能让你坐立不安。这就对了。"
                </p>
            </div>
        </div>

        <!-- ==================== 结果页 ==================== -->
        <div class="page" id="page-result">
            <div class="max-w-md mx-auto px-6 py-8">
                <div class="flex justify-between items-center mb-8">
                    <button onclick="startAssessment()" class="text-gray-500 hover:text-white transition text-sm">
                        ← 重新评估生存率
                    </button>
                    <button onclick="showSharePage()" class="text-red-500 hover:text-red-400 transition text-sm font-bold">
                        生成生存报告 · 发给同事看看
                    </button>
                </div>

                <!-- 人格展示 -->
                <div class="text-center mb-6">
                    <div class="w-24 h-24 rounded-full glass flex items-center justify-center mx-auto mb-4 text-6xl scale-in" id="result-icon"></div>
                    <div class="text-xs text-gray-500 tracking-widest uppercase mb-2">你的职场生存人格</div>
                    <h1 class="text-4xl font-black tracking-tight" id="result-name"></h1>
                    <p class="text-sm text-gray-400 mt-2" id="result-tagline"></p>
                </div>

                <!-- 金句卡片 -->
                <div class="glass rounded-2xl p-6 mb-6 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full" id="result-accent-bar"></div>
                    <p class="text-lg font-bold leading-relaxed italic text-gray-200" id="result-desc"></p>
                </div>

                <!-- 雷达图（8轴） -->
                <div class="glass rounded-2xl p-6 mb-6">
                    <h3 class="text-sm font-bold text-gray-400 mb-4 text-center tracking-wider">8维人格雷达</h3>
                    <canvas id="radar-canvas" class="w-full" style="max-width: 300px; margin: 0 auto; display: block;"></canvas>
                </div>

                <!-- 核心特质 -->
                <div class="glass rounded-2xl p-6 mb-6">
                    <h3 class="text-sm font-bold text-gray-400 mb-4 tracking-wider">核心特质</h3>
                    <div class="flex flex-wrap gap-2" id="result-traits"></div>
                </div>

                <!-- 危险关系 -->
                <div class="glass rounded-2xl p-6 mb-6" style="border-left: 2px solid var(--accent-red);">
                    <h3 class="text-sm font-bold text-red-400 mb-4 tracking-wider">职场食物链关系</h3>
                    <div class="space-y-3 text-sm" id="result-relations"></div>
                </div>

                <!-- 生存风险 -->
                <div class="glass rounded-2xl p-6 mb-6" style="border-left: 2px solid var(--accent-orange);">
                    <h3 class="text-sm font-bold text-orange-400 mb-4 tracking-wider">生存风险</h3>
                    <div class="space-y-3" id="result-risks"></div>
                </div>

                <!-- 生存策略 -->
                <div class="glass rounded-2xl p-6 mb-6" style="border-left: 2px solid var(--accent-red);">
                    <h3 class="text-sm font-bold text-red-400 mb-4 tracking-wider">生存策略</h3>
                    <p class="text-sm text-gray-300 leading-relaxed" id="result-advice"></p>
                </div>

                <!-- 黑化终局 -->
                <div class="glass rounded-2xl p-6 mb-6" style="border-left: 2px solid #8b5cf6;">
                    <h3 class="text-sm font-bold text-purple-400 mb-4 tracking-wider">你的黑化时间表</h3>
                    <div id="result-darkening" class="text-sm text-gray-300 leading-relaxed"></div>
                </div>

                <!-- 高薪后的你 -->
                <div class="glass rounded-2xl p-6 mb-8" style="border-left: 2px solid var(--accent-green);">
                    <h3 class="text-sm font-bold text-green-400 mb-4 tracking-wider">金钱驯化指数</h3>
                    <div id="result-salary" class="text-sm text-gray-300 leading-relaxed"></div>
                </div>

                <!-- 行动按钮 -->
                <button onclick="showSharePage()" class="w-full py-4 rounded-2xl text-lg font-bold bg-gradient-to-r from-red-600 to-pink-500 text-white glow-red hover:from-red-500 hover:to-pink-400 transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] mb-3">
                    生成生存报告 · 发给同事看看谁更危险
                </button>
                <button onclick="startAssessment()" class="w-full py-3 rounded-2xl text-sm text-gray-500 hover:text-white transition">
                    重新评估你的生存率
                </button>
            </div>
        </div>

        <!-- ==================== 分享页 ==================== -->
        <div class="page" id="page-share">
            <div class="max-w-md mx-auto px-6 py-8">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="goResult()" class="text-gray-400 hover:text-white transition text-sm">
                        ← 返回报告
                    </button>
                    <span class="text-xs text-gray-600">长按保存图片</span>
                </div>

                <!-- 报告卡片 -->
                <div class="share-card mb-8" id="share-card">
                    <div class="relative z-10">
                        <div class="text-center mb-5">
                            <div class="text-xs text-gray-500 tracking-widest mb-4">职场生存人格诊断报告</div>
                            <div class="text-5xl mb-4" id="share-icon"></div>
                            <h2 class="text-3xl font-black text-gradient mb-1" id="share-name"></h2>
                            <p class="text-xs text-gray-500 mt-2" id="share-tagline"></p>
                        </div>
                        <div class="border-t border-gray-800 my-4"></div>

                        <div class="border-t border-gray-800 my-4"></div>

                            <span class="text-red-500">扫码测你的类型 →</span>
                        </div>
                        <div class="mt-5 flex justify-center">
                            <div class="w-20 h-20 bg-white rounded-xl flex items-center justify-center overflow-hidden shadow-lg" id="qr-container">
                                <canvas id="qr-canvas" width="72" height="72"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 分享操作 -->
                <div class="space-y-3">
                    <button onclick="saveShareImage()" id="save-btn" class="w-full py-3.5 rounded-2xl text-sm font-bold glass text-white hover:border-red-600 transition">
                        保存诊断报告

        function generateQRCode(text, size = 72) {
            const canvas = document.getElementById('qr-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = size;
            canvas.height = size;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, size, size);
            ctx.fillStyle = '#fff';

            const margin = 6;
            const blockSize = (size - margin * 2) / 7;

            for (let corner = 0; corner < 3; corner++) {
                let cx, cy;
                if (corner === 0) { cx = margin; cy = margin; }
                else if (corner === 1) { cx = size - margin - blockSize * 3; cy = margin; }
                else { cx = margin; cy = size - margin - blockSize * 3; }

                ctx.fillStyle = '#fff';
                ctx.fillRect(cx + blockSize, cy + blockSize, blockSize, blockSize);
            }

            ctx.fillStyle = '#fff';
            ctx.font = '9px Inter, PingFang SC, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('扫码', size/2, size - 3);
        }

        // ==================== 页面导航 ====================
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const page = document.getElementById('page-' + pageName);
            if (page) page.classList.add('active');
            APP.currentPage = pageName;

            if (window.analytics) {
                analytics.trackPageView(pageName);
            }
        }

        function goHome() {
            APP.answers = [];
            APP.currentQuestionIndex = 0;
            APP.result = null;
            APP.scores = null;
            showPage('home');
        }

        function goResult() {
            if (!APP.result) {
                goHome();
                return;
            }
            showPage('result');
        }

        function confirmExit() {
            if (APP.answers.length > 0 && APP.answers.length < 30) {
                if (confirm('确定退出吗？当前进度将丢失。')) {
                    goHome();
                }

        // ==================== 测评逻辑 ====================
        function startAssessment() {
            APP.answers = [];
            APP.currentQuestionIndex = 0;
            APP.selectedOption = null;
            APP.result = null;
            APP.scores = null;
            APP.assessmentStartTime = Date.now();

            // 从30题中随机选取30题（即全部使用），打乱顺序
            APP.questions = [...QUESTION_BANK].sort(() => Math.random() - 0.5);
            APP.currentQuestionIndex = 0;
            APP.selectedOption = null;

            if (window.analytics) {
                analytics.trackAssessmentStart();
            }

            showPage('assessment');
            renderQuestion();
        }

        function renderQuestion() {
            const q = APP.questions[APP.currentQuestionIndex];
            const dimNames = {
                dominance: '权力饥渴度', submission: '服从驯化度', money: '利益现实主义',
                idealism: '理想主义残留', emotion: '情绪依赖指数', rebellion: '反骨指数',
                politics: '办公室政治力', darkness: '黑化倾向'
            };

            document.getElementById('dimension-tag').textContent =
                '▎' + (dimNames[q.dimension] || '');
            document.getElementById('question-text').textContent = q.q;
            document.getElementById('current-q').textContent = APP.currentQuestionIndex + 1;

            const progress = ((APP.currentQuestionIndex) / 30) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            APP.selectedOption = null;

            const optionLabels = ['非常符合', '比较符合', '一般', '不太符合', '完全不符合'];
            q.scores.forEach((score, idx) => {
                const div = document.createElement('div');
                div.className = 'option-card rounded-xl p-4 flex items-center';
                div.innerHTML = `
                    <span class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold border border-gray-600 mr-3 flex-shrink-0">${String.fromCharCode(65 + idx)}</span>
                    <span class="text-sm text-gray-200">${optionLabels[idx]}</span>
                `;
                let touchStartY = 0;
                div.addEventListener('touchstart', (e) => {
                    touchStartY = e.touches[0].clientY;
                }, { passive: true });
                div.addEventListener('touchend', (e) => {
                    const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
                    if (dy < 10) selectOption(idx);
                });
                div.addEventListener('click', () => selectOption(idx));
                container.appendChild(div);
            });

            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = true;
            nextBtn.className = 'w-full py-4 rounded-2xl text-lg font-bold bg-gray-800 text-gray-600 transition-all duration-300';
            nextBtn.textContent = APP.currentQuestionIndex === 29 ? '查看结果' : '下一题';

            // Scroll question area to top
            const scrollArea = document.querySelector('#page-assessment .assessment-scroll');
            if (scrollArea) scrollArea.scrollTop = 0;
        }

        function selectOption(idx) {
            APP.selectedOption = idx;
            document.querySelectorAll('.option-card').forEach((el, i) => {
                el.classList.toggle('active', i === idx);
            });

            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = false;
            nextBtn.className = 'w-full py-4 rounded-2xl text-lg font-bold bg-gradient-to-r from-red-600 to-pink-500 text-white hover:from-red-500 hover:to-pink-400 transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] glow-red';
        }

        function nextQuestion() {
            if (APP.selectedOption === null) return;

            // 记录答案（存储选项索引和对应分数）
            const q = APP.questions[APP.currentQuestionIndex];
            APP.answers.push({
                questionIndex: APP.currentQuestionIndex,
                optionIndex: APP.selectedOption,
                scores: q.scores[APP.selectedOption]
            });

            if (APP.currentQuestionIndex < 29) {
                APP.currentQuestionIndex++;
                APP.selectedOption = null;
                renderQuestion();
            } else {
                calculateResult();
            }
        }

        // ==================== 结果计算（8维度 → 坐标轴 → 人格判定）====================
        function calculateResult() {
            showPage('loading');

            // 初始化8维度分数
            const scores = {
                dominance: 0,
                submission: 0,
                money: 0,
                idealism: 0,
                emotion: 0,
                rebellion: 0,
                politics: 0,
                darkness: 0
            };

            // 累加所有答案的分数
            APP.answers.forEach(answer => {
                const s = answer.scores;
                Object.keys(scores).forEach(dim => {
                    scores[dim] += (s[dim] || 0);
                });
            });

            // 归一化到0-100（每题最高5分，30题最高150分，除以1.5得到0-100）
            Object.keys(scores).forEach(dim => {
                scores[dim] = Math.round((scores[dim] / 1.5) * 10) / 10;
            });

            APP.scores = scores;

            // 计算坐标轴
            const xAxis = scores.dominance - scores.submission;
            const yAxis = scores.idealism - scores.money;

            // 判定逻辑（按优先级）
            let resultName = '';

            if (scores.rebellion > 85 && scores.money > 75) {
                resultName = '工资驯化型Brat';
            } else if (scores.dominance > 80 && scores.darkness > 70) {
                resultName = '冷血操盘者';
            } else if (scores.submission > 80 && scores.emotion > 75) {
                resultName = '认可依赖型';
            } else if (Math.abs(xAxis) < 10) {
                resultName = '变色龙 Switch';
            } else if (xAxis > 0 && yAxis < 0) {
                resultName = '权杖者 Dominant';
            } else if (xAxis < 0 && yAxis > 0) {
                resultName = '高敏执行者';
            } else {
                resultName = '利益切换者';
            }

            // 特殊处理：某些高分情况
            if (scores.rebellion > 80 && resultName === '利益切换者') {
                resultName = '反骨打工人 Brat';
            }
            if (scores.politics > 80 && resultName === '利益切换者') {
                resultName = '阴阳大师';
            }
            if (scores.darkness > 75 && resultName === '利益切换者') {
                resultName = '冷血操盘者';
            }
            if (scores.emotion > 80 && resultName === '高敏执行者') {
                resultName = '认可依赖型';
            }

            // 确保结果在12种人格内
            const validNames = Object.keys(PERSONALITIES);
            if (!validNames.includes(resultName)) {
                // 映射到最接近的
                if (resultName === '工资驯化型Brat') resultName = '反骨打工人 Brat';
                else resultName = '利益切换者';
            }

            const person = PERSONALITIES[resultName];
            APP.result = {
                name: person.name,
                tag: person.tag,
                icon: person.icon,
                traits: person.traits,
                risks: person.risks,
                advice: person.advice,
                color: person.color,
                scores: scores,
                xAxis: xAxis,
                yAxis: yAxis
            };

            const duration = Date.now() - APP.assessmentStartTime;

            if (window.analytics) {
                analytics.trackAssessmentComplete(resultName, scores, duration);
            }

            setTimeout(() => {
                renderResult();
                showPage('result');
            }, 2800);
        }

        function renderResult() {
            const r = APP.result;
            document.getElementById('result-icon').textContent = r.icon;

            const nameEl = document.getElementById('result-name');
            nameEl.textContent = r.name;
            nameEl.className = 'text-4xl font-black tracking-tight text-gradient';

            document.getElementById('result-tagline').textContent = r.tag;
            document.getElementById('result-desc').textContent = getResultDescription(r);

            const bar = document.getElementById('result-accent-bar');
            if (bar && r.color) {
                bar.style.background = 'linear-gradient(to bottom, ' + r.color + ', transparent)';
            }

            // 核心特质
            document.getElementById('result-traits').innerHTML = r.traits.map(t =>
                `<span class="px-3 py-1.5 rounded-full text-xs font-bold bg-gray-800/80 text-gray-200 border border-gray-700">${t}</span>`
            ).join('');

            // 危险关系
            const rel = PERSONALITY_RELATIONS[r.name];
            if (rel) {
                document.getElementById('result-relations').innerHTML = `
                    <div class="flex items-start"><span class="text-green-400 mr-2 text-sm">♥</span><span class="text-gray-300">最佳搭档：<strong class="text-green-400">${rel.bestMatch}</strong></span></div>
                    <div class="flex items-start"><span class="text-red-400 mr-2 text-sm">✖</span><span class="text-gray-300">宿敌：<strong class="text-red-400">${rel.enemy}</strong></span></div>
                    <div class="flex items-start"><span class="text-purple-400 mr-2 text-sm">⚠</span><span class="text-gray-300">危险关系：<strong class="text-purple-400">${rel.dangerous}</strong></span></div>
                `;
            }

            // 致命弱点
            document.getElementById('result-risks').innerHTML = r.risks.map(risk =>
                `<div class="flex items-start"><span class="text-orange-500 mr-2 text-sm mt-0.5">▸</span><span class="text-sm text-gray-300">${risk}</span></div>`
            ).join('');

            // 破局之道
            document.getElementById('result-advice').textContent = r.advice;

            // 黑化终局
            const darkText = DARKENING_SYSTEM[r.name];
            if (darkText) {
                document.getElementById('result-darkening').innerHTML = `<p>${darkText}</p>`;
            }

            // 高薪后的你
            const salary = SALARY_TRANSFORMATION[r.name];
            if (salary) {
                document.getElementById('result-salary').innerHTML = `
                    <p class="mb-2"><span class="text-red-400">低薪时：</span>${salary.low}</p>
                    <p><span class="text-green-400">高薪后：</span>${salary.high}</p>
                `;
            }

            setTimeout(drawRadar, 300);
        }

                '阴阳大师': '你从不当面撕破脸，但背后从不手软。你的"委婉"是最高级的攻击，用最软的语气说最狠的话。但长期玩这套，最先内耗死的是你自己。',
                '冷血操盘者': '经历长期博弈后，你已经学会把情绪当成累赘丢掉。结果至上，效率第一。你是最可怕的那类人——因为你没有软肋。但也没有人能真正靠近你。',
                '情绪供养者': '你是团队的情绪稳定器，每个人的负面情绪都能被你接住。但你自己的需求呢？你像一块海绵，吸收所有人的情绪污水，总有一天会饱和溢出。',
                'KPI施虐狂': '数据是你的宗教，KPI是你的圣经。你用数字压迫他人，也用数字证明自己。你的团队又爱又恨你——但更多的是恨。数据不会背叛你，人会。',
                '工资依赖型 Sub': '高薪是你最大的锁链，你自己亲手戴上的。为了维持收入水平，你愿意忍受任何不合理。你以为自己在做明智的选择，其实你早就被金钱彻底驯化了。'

            return descs[r.name] || '你是一种独特的职场生物，连这个测试都没法完全定义你。';
        }

        // ==================== 8维雷达图 ====================
        function drawRadar() {
            const canvas = document.getElementById('radar-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const scores = APP.scores;
            if (!scores) return;

            const dimensions = ['dominance', 'submission', 'money', 'idealism', 'emotion', 'rebellion', 'politics', 'darkness'];
            const labels = ['权力饥渴', '服从驯化', '利益现实', '理想残留', '情绪依赖', '反骨指数', '政治力', '黑化倾向'];
            const colors = ['#ff0066', '#3b82f6', '#eab308', '#10b981', '#f97316', '#a855f7', '#06b6d4', '#8b5cf6'];
            const values = dimensions.map(d => (scores[d] || 0) / 100 * 4); // 归一化到0-4

            const size = Math.min(canvas.parentElement.clientWidth - 32, 300);
            canvas.width = size;
            canvas.height = size;
            const cx = size / 2, cy = size / 2, r = size * 0.33;

            ctx.clearRect(0, 0, size, size);

            // 绘制网格线
            for (let i = 1; i <= 4; i++) {
                ctx.beginPath();
                for (let j = 0; j < 8; j++) {
                    const angle = (Math.PI * 2 / 8) * j - Math.PI / 2;
                    const x = cx + r * (i / 4) * Math.cos(angle);
                    const y = cy + r * (i / 4) * Math.sin(angle);
                    if (j === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.strokeStyle = 'rgba(255,255,255,0.06)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // 绘制轴线
            for (let i = 0; i < 8; i++) {
                const angle = (Math.PI * 2 / 8) * i - Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
                ctx.strokeStyle = 'rgba(255,255,255,0.04)';
                ctx.stroke();
            }

            // 绘制数据区域
            ctx.beginPath();
            values.forEach((v, i) => {
                const angle = (Math.PI * 2 / 8) * i - Math.PI / 2;
                const x = cx + r * (v / 4) * Math.cos(angle);
                const y = cy + r * (v / 4) * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.closePath();

            const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
            gradient.addColorStop(0, 'rgba(255, 0, 102, 0.3)');
            gradient.addColorStop(1, 'rgba(255, 0, 102, 0.04)');
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = 'rgba(255, 0, 102, 0.6)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 绘制数据点
            values.forEach((v, i) => {
                const angle = (Math.PI * 2 / 8) * i - Math.PI / 2;
                const x = cx + r * (v / 4) * Math.cos(angle);
                const y = cy + r * (v / 4) * Math.sin(angle);
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fillStyle = colors[i];
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            });

            // 绘制标签
            ctx.font = 'bold 10px Inter, PingFang SC, sans-serif';
            ctx.textAlign = 'center';
            labels.forEach((label, i) => {
                const angle = (Math.PI * 2 / 8) * i - Math.PI / 2;
                const x = cx + (r + 24) * Math.cos(angle);
                const y = cy + (r + 24) * Math.sin(angle);
                ctx.fillStyle = '#b0b0c0';
                ctx.fillText(label, x, y + 4);
            });
        }

        // ==================== 分享功能 ====================
        function showSharePage() {
            if (!APP.result) {
                goHome();
                return;
            }
            const r = APP.result;

            document.getElementById('share-icon').textContent = r.icon;
            document.getElementById('share-name').textContent = r.name;
            document.getElementById('share-tagline').textContent = r.tag;
            document.getElementById('share-quote').textContent = '"' + getResultDescription(r) + '"';

            const now = new Date();
            document.getElementById('share-date').textContent =
                now.getFullYear() + '.' + String(now.getMonth() + 1).padStart(2, '0') + '.' + String(now.getDate()).padStart(2, '0');

            showPage('share');

            setTimeout(() => generateQRCode(window.location.href), 200);

            detectWechatEnv();

            if (window.analytics) {
                analytics.track('share_page_view', { type: r.name });
            }
        }

        function detectWechatEnv() {
            const isWechat = /MicroMessenger/i.test(navigator.userAgent);
            const btn = document.getElementById('wechat-share-btn');
            if (isWechat) {
                btn.textContent = '点击右上角分享给朋友';
                btn.onclick = function() {
                    showToast('请点击右上角"..."按钮分享');
                };
            }
        }

        async function saveShareImage() {
            const btn = document.getElementById('save-btn');
            const originalText = btn.textContent;
            btn.textContent = '生成中...';
            btn.classList.add('btn-loading');

            try {
                const card = document.getElementById('share-card');
                const canvas = await html2canvas(card, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#0a0a0f',
                    logging: false
                });

                const link = document.createElement('a');
                link.download = '职场权力人格报告_' + (APP.result ? APP.result.name : '') + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                showToast('报告图片已保存！');

                if (window.analytics) {
                    analytics.trackImageSave();
                }
            } catch (err) {
                console.error('Save image error:', err);
                showToast('保存失败，请尝试截图保存', true);
            } finally {
                btn.textContent = originalText;
                btn.classList.remove('btn-loading');
            }
        }

        function copyShareLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                showToast('链接已复制，快发出去！');
                if (window.analytics) {
                    analytics.trackLinkCopy();
                }
            }).catch(() => {
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showToast('链接已复制！');
            });
        }

        function shareViaWechat() {
            const isWechat = /MicroMessenger/i.test(navigator.userAgent);
            if (isWechat) {
                showToast('请点击右上角"..."按钮分享');
            } else {
                showToast('请保存图片后分享到微信');
            }

            if (window.analytics) {
                analytics.trackShare('wechat');
            }
        }

        // ==================== 初始化 ====================
        function init() {
            try {
                if (window.analytics) {
                    const stats = analytics.getLocalStats();
                    const total = 15847 + stats.totalCompletions;
                    document.getElementById('total-users').textContent = total.toLocaleString();
                }
            } catch(e) {}

            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('service-worker.js').catch(() => {});
                });
            }
        }

        document.addEventListener('DOMContentLoaded', init);

        window.addEventListener('popstate', (e) => {
            if (APP.currentPage === 'assessment' && APP.answers.length > 0) {
                confirmExit();
            }
        });
    </script>
